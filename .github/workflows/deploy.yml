name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write  # 赋予写入分支的权限，解决git报错

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: ./smart-data-dashboard

      - name: Build project
        run: npm run build
        working-directory: ./smart-data-dashboard

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./smart-data-dashboard/dist  # 构建产物路径
          branch: gh-pages  # 自动创建gh-pages分支
          clean: true  # 清理旧的部署文件
