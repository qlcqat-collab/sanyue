name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 去掉 cache 配置，避免锁文件找不到的问题

      - name: Install dependencies
        run: npm install
        working-directory: ./smart-data-dashboard

      - name: Build project
        run: npm run build
        working-directory: ./smart-data-dashboard

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./smart-data-dashboard/dist
          branch: gh-pages
          clean: true
